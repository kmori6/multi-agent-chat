services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      LLAMA_CACHE: /models/cache
    # https://unsloth.ai/docs/models/gemma-4
    command: >
      -hf unsloth/gemma-4-31B-it-GGUF:UD-Q4_K_XL
      --alias gemma-4-31b-it
      --host 0.0.0.0
      --port 8000
      -c 4096
      --temp 1.0
      --top-p 0.95
      --top-k 64
      --reasoning off
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  postgres:
    image: postgres:18.3
    restart: always
    environment:
      POSTGRES_PASSWORD: example
    ports:
      - "5432:5432"
    volumes:
      - ./flyway/postgresql:/var/lib/postgresql

  flyway-postgres:
    build:
      context: .
      dockerfile: docker/flyway.Dockerfile
    command: ["migrate"]
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/postgres
      - FLYWAY_SCHEMAS=public
      - FLYWAY_USER=postgres
      - FLYWAY_PASSWORD=example
      - FLYWAY_CONNECT_RETRIES=60
    # Mount host directory for hot-reload during local development
    # This overrides the /flyway/sql copied in Dockerfile with postgres-specific migrations
    volumes:
      - ./flyway/sql/postgres:/flyway/sql
    depends_on:
      - postgres

  flyway-thread:
    build:
      context: .
      dockerfile: docker/flyway.Dockerfile
    command: ["migrate"]
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/thread
      - FLYWAY_SCHEMAS=public
      - FLYWAY_USER=postgres
      - FLYWAY_PASSWORD=example
      - FLYWAY_CONNECT_RETRIES=60
    # Mount host directory for hot-reload during local development
    # This overrides the /flyway/sql copied in Dockerfile with auth-specific migrations
    volumes:
      - ./flyway/sql/thread:/flyway/sql
    depends_on:
      - postgres
      - flyway-postgres
